# BEGIN_KITTY_THEME
# Ayaka
include current-theme.conf
# END_KITTY_THEME
map alt+left send_text all \x1b\x62
map alt+right send_text all \x1b\x66

macos_option_as_alt no

# --- window mode (tmux-style leader: press ctrl+a to enter, esc to exit) ---

# ctrl+a enters a persistent keyboard mode. Because it does not use
# `--on-action end`, the mode stays active after each action, so you can press
# h/j/k/l repeatedly to jump across more than one window at a time.
map --new-mode winmode --timeout 0.5 ctrl+a

# move between splits (repeatable — stays in the mode)
map --mode winmode h neighboring_window left
map --mode winmode l neighboring_window right
map --mode winmode k neighboring_window up
map --mode winmode j neighboring_window down

# tabs (repeatable)
map --mode winmode n next_tab
map --mode winmode p previous_tab

# fullscreen (zoom) the current pane — toggle back with the same key (repeatable)
map --mode winmode z toggle_layout stack

# cycle to the next layout (repeatable)
map --mode winmode space next_layout

# create splits, then leave the mode
map --mode winmode | combine : launch --location=vsplit --cwd=current : pop_keyboard_mode
map --mode winmode - combine : launch --location=hsplit --cwd=current : pop_keyboard_mode

# scrollback in nvim, then leave the mode
map --mode winmode r combine : show_scrollback : pop_keyboard_mode
map --mode winmode e combine : show_last_command_output : pop_keyboard_mode

# rename the current tab (interactive prompt), then leave the mode
map --mode winmode , combine : set_tab_title : pop_keyboard_mode

map --mode winmode 1  goto_tab 1
map --mode winmode 2  goto_tab 2
map --mode winmode 3  goto_tab 3
map --mode winmode 4  goto_tab 4
map --mode winmode 5  goto_tab 5

# exit the mode
map --mode winmode esc pop_keyboard_mode
map --mode winmode enter pop_keyboard_mode
map --mode winmode ctrl+a pop_keyboard_mode

# --- scrollback in nvim ---
scrollback_pager nvim --cmd 'set eventignore=FileType' +'nnoremap q ZQ' +'call nvim_open_term(0, {})' +'set nomodified nolist' +'$' -


# font_family JetBrains Mono
font_size 14.0

# Tab bar stuff
tab_bar_edge top
tab_bar_style powerline
tab_title_template "{index}: {title}"
active_tab_title_template "{index}: {title}*"
# Inactive tabs: dark muted rose with light theme foreground for readable, recessed look
inactive_tab_background #4a3644
inactive_tab_foreground #cedaeb
hide_window_decorations titlebar-only


# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
