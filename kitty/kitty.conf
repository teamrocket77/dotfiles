# BEGIN_KITTY_THEME
# Ayaka
include current-theme.conf
# END_KITTY_THEME
map alt+left send_text all \x1b\x62
map alt+right send_text all \x1b\x66

macos_option_as_alt no

# --- window splits (tmux-style leader: ctrl+a then | or -) ---
enabled_layouts splits,stack
map ctrl+a>| launch --location=vsplit --cwd=current
map ctrl+a>- launch --location=hsplit --cwd=current

# move between splits (leader + arrows)
map ctrl+a>h neighboring_window left
map ctrl+a>l neighboring_window right
map ctrl+a>k neighboring_window up
map ctrl+a>j neighboring_window down
map ctrl+a>n next_tab
map ctrl+a>p previous_tab
down
# --- scrollback in nvim (leader + h/g) ---
scrollback_pager nvim --cmd 'set eventignore=FileType' +'nnoremap q ZQ' +'call nvim_open_term(0, {})' +'set nomodified nolist' +'$' -
map ctrl+a>r show_scrollback
map ctrl+a>e show_last_command_output
# font_family JetBrains Mono
font_size 14.0

# Tab bar stuff
tab_bar_edge top
tab_bar_style fade
tab_title_template "{index}: {title}"
active_tab_title_template "{index}: {title}*"
hide_window_decorations titlebar-only


# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
